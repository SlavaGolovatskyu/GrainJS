<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualList — photo rows</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px 80px;
      background: #f0f2f5;
      color: #222;
    }
    .demo {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .lead { color: #444; line-height: 1.5; }
    .toolbar { display: flex; gap: 8px; margin: 14px 0; }
    .toolbar button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ced4da;
      border-radius: 6px;
      background: #fff;
    }
    .toolbar button.active {
      background: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 0 0 14px;
    }
    .meta { color: #555; font-size: 0.9rem; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      background: #e7f1ff;
      color: #084298;
    }
    .badge--scroll { background: #fff3cd; color: #664d03; }
    .badge--window { background: #d1e7dd; color: #0f5132; }
    .badge--img { background: #f8d7da; color: #842029; }
    .list {
      border: 1px solid #dde1e6;
      border-radius: 8px;
      background: #f7f8fa;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100%;
      padding: 8px 12px;
      box-sizing: border-box;
      border-bottom: 1px solid #e8ebef;
    }
    .card--h {
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      border-bottom: none;
      border-right: 1px solid #e8ebef;
    }
    .card.flash-0 { background: #fff; }
    .card.flash-1 { background: #e8f1ff; }
    .card__img {
      display: block;
      object-fit: cover;
      border-radius: 6px;
      background: #dee2e6;
      flex-shrink: 0;
    }
    .card--h .card__img {
      width: 100%;
      height: 96px;
    }
    .card__body { min-width: 0; flex: 1; }
    .card__title {
      font-weight: 650;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .card__meta { display: flex; flex-wrap: wrap; gap: 6px; }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./19-virtual-list.jsx"></script>
</body>
</html>
