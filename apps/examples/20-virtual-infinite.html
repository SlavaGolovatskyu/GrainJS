<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VirtualList — infinite scroll</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px 80px;
      background: #f0f2f5;
      color: #222;
    }
    .demo {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .lead { color: #444; line-height: 1.5; }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e7f1ff;
      color: #084298;
    }
    .badge--load { background: #fff3cd; color: #664d03; }
    .badge--more { background: #d1e7dd; color: #0f5132; }
    .list {
      border: 1px solid #dde1e6;
      border-radius: 8px;
      background: #f7f8fa;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100%;
      padding: 8px 12px;
      box-sizing: border-box;
      border-bottom: 1px solid #e8ebef;
      background: #fff;
    }
    .card__img {
      display: block;
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      background: #dee2e6;
      flex-shrink: 0;
    }
    .card__title { font-weight: 650; font-size: 14px; }
    .card__sub { font-size: 12px; color: #6c757d; margin-top: 4px; }
    .empty, .footer { color: #666; font-size: 0.95rem; }
    .footer { margin-top: 12px; text-align: center; }
    .error { color: #842029; background: #f8d7da; padding: 8px 10px; border-radius: 6px; }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./20-virtual-infinite.jsx"></script>
</body>
</html>
