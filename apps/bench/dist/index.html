<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grainlet framework bench</title>
    <script type="module" crossorigin src="/assets/index-hdk_LIZZ.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DlLVtIF5.css">
  </head>
  <body>
    <header class="bench-header">
      <h1>Framework compare</h1>
      <p>
        Keyed list scenarios (create / update / select / swap / remove) for
        Grainlet, React, Preact, and Solid.
      </p>
      <div class="controls">
        <label>
          Framework
          <select id="framework"></select>
        </label>
        <label>
          Runs
          <input id="runs" type="number" min="1" max="50" value="10" />
        </label>
        <button type="button" id="run-bench" class="btn btn-primary">
          Run benchmark
        </button>
        <span id="status"></span>
      </div>
    </header>
    <div id="results"></div>
    <hr />
    <div id="app"></div>
  </body>
</html>
